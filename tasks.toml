# ref: https://mise.jdx.dev/tasks/
#:schema https://mise.jdx.dev/schema/mise-task.json

[check]
usage = '''
flag "--lint" help="Run hk check instead of fix"
'''
run = "hk {% if usage.lint %}check{% else %}fix{% endif %} --all --no-progress --no-fail-fast"
env.GH_TOKEN = "{% if env.GITHUB_TOKEN is defined %}{{ env.GITHUB_TOKEN }}{% endif %}"
description = "Run hk linters and formatters."

[build]
run = "json5 src/default.json5 --out-file default.json --space t && printf '\\n' >> default.json"
description = "Build default.json from src/default.json5."

["build:diff"]
run = """
json5 src/default.json5 --space t \
  | awk '{ print }' \
  | diff -u --label a/default.json --label b/default.json default.json -
"""
description = "Print a patch when default.json is not up to date."

["test"]
depends = ["build"]
run = "bun test"
description = "Run tests."
